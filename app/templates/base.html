<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>btp-cortex 🧠</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@heroicons/react@2.0.18/index.min.css">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: "#F97316",
            surface: "#292524",
            base:    "#1C1917",
            content: "#F5F5F4",
            success: "#22C55E",
          }
        }
      }
    }
  </script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body class="min-h-screen flex bg-base text-content">

  <!-- Sidebar -->
  <aside class="flex-shrink-0 flex flex-col p-6 gap-8 bg-surface" style="width:240px;">
    <a href="/" class="tracking-tight" style="font-size:20px; font-weight:700; color:#F97316; letter-spacing:-0.5px; font-family: 'Georgia', serif;">
      BTP<span style="color:#F5F5F4; font-weight:300;">cortex</span>
    </a>
    <nav class="flex flex-col gap-4 text-sm font-medium">
      <a href="/"          class="hover:text-primary transition-colors">🏠 Accueil</a>
      <a href="/upload"    class="hover:text-primary transition-colors">📤 Upload</a>
      <a href="/chat"      class="hover:text-primary transition-colors">💬 Chat</a>
      <a href="/documents" class="hover:text-primary transition-colors">📁 Documents</a>
    </nav>
  </aside>

  <!-- Main content -->
  <main class="flex-1 p-8 overflow-y-auto">

    <!-- Flash messages -->
    {% with messages = get_flashed_messages() %}
      {% if messages %}
        {% for msg in messages %}
          <div class="rounded px-4 py-3 mb-6 font-medium text-sm bg-success text-base">
            {{ msg }}
          </div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    {% block content %}{% endblock %}
  </main>
<script>lucide.createIcons();</script>
</body>
</html>
