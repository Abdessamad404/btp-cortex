{% extends "base.html" %}

{% block content %}

<div class="flex flex-col mx-auto" style="max-width:800px; height:calc(100vh - 80px);">

  <!-- Header -->
  <div class="mb-6">
    <h1 class="text-2xl font-medium mb-1" style="color:#F5F5F4;">Chat</h1>
    <p class="text-sm" style="color:#78716C;">Posez vos questions sur vos documents BTP.</p>
  </div>

  <!-- Chat box -->
  <div id="chat-box" class="flex-1 overflow-y-auto flex flex-col gap-4 mb-4 pr-1">
    <!-- Welcome message -->
    <div class="flex gap-3 items-start">
      <div class="rounded-lg flex items-center justify-center flex-shrink-0"
           style="width:32px; height:32px; background:#292524; border:0.5px solid #44403C;">
        <i data-lucide="bot" style="width:16px; height:16px; color:#F97316;"></i>
      </div>
      <div class="rounded-xl rounded-tl-none px-4 py-3 text-sm" style="background:#292524; color:#F5F5F4; max-width:75%;">
        Bonjour ! Posez-moi une question sur vos documents BTP indexés.
      </div>
    </div>
  </div>

  <!-- Input area -->
  <div class="rounded-xl flex items-center gap-3 px-4 py-3"
       style="background:#292524; border:0.5px solid #44403C;">
    <input id="question" type="text"
           placeholder="Ex: Quelle est la résistance du béton pour les fondations ?"
           class="flex-1 bg-transparent text-sm outline-none"
           style="color:#F5F5F4;"
           autocomplete="off">
    <button id="send-btn"
            class="rounded-lg px-4 py-2 text-sm font-semibold flex items-center gap-2 transition-all hover:opacity-90"
            style="background:#F97316; color:#1C1917; flex-shrink:0;">
      <i data-lucide="send" style="width:14px; height:14px;"></i>
      Envoyer
    </button>
  </div>

</div>

<script>
  const chatBox  = document.getElementById("chat-box");
  const input    = document.getElementById("question");
  const sendBtn  = document.getElementById("send-btn");

  sendBtn.addEventListener("click", sendMessage);
  input.addEventListener("keydown", e => {
    if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });

  async function sendMessage() {
    const question = input.value.trim();
    if (!question) return;

    appendMessage("user", question);
    input.value = "";
    sendBtn.disabled = true;

    // Show typing indicator
    const typingId = appendTyping();

    try {
      const res  = await fetch("/api/chat", {
        method:  "POST",
        headers: { "Content-Type": "application/json" },
        body:    JSON.stringify({ question })
      });
      const data = await res.json();
      removeTyping(typingId);

      let reply = data.answer || data.error;
      if (data.sources?.length) {
        reply += `\n\n📎 Sources : ${data.sources.join(", ")}`;
      }
      appendMessage("bot", reply);
    } catch(err) {
      removeTyping(typingId);
      appendMessage("bot", "Erreur de connexion. Réessayez.");
    }

    sendBtn.disabled = false;
    input.focus();
  }

  function appendMessage(role, text) {
    const isUser = role === "user";
    const div = document.createElement("div");
    div.className = `flex gap-3 items-start ${isUser ? "flex-row-reverse" : ""}`;
    div.innerHTML = `
      <div style="width:32px; height:32px; background:#292524; border:0.5px solid #44403C;
                  border-radius:8px; display:flex; align-items:center; justify-content:center; flex-shrink:0;">
        <i data-lucide="${isUser ? 'user' : 'bot'}" style="width:16px; height:16px; color:${isUser ? '#A8A29E' : '#F97316'};"></i>
      </div>
      <div style="background:${isUser ? '#1C1917' : '#292524'}; color:#F5F5F4; max-width:75%;
                  border:0.5px solid #44403C; border-radius:12px;
                  ${isUser ? 'border-top-right-radius:2px' : 'border-top-left-radius:2px'};
                  padding:12px 16px; font-size:14px; line-height:1.6; white-space:pre-wrap;">
        ${text}
      </div>`;
    chatBox.appendChild(div);
    chatBox.scrollTop = chatBox.scrollHeight;
    lucide.createIcons();
  }

  function appendTyping(id) {
    const uid = "typing-" + Date.now();
    const div = document.createElement("div");
    div.id = uid;
    div.className = "flex gap-3 items-start";
    div.innerHTML = `
      <div style="width:32px; height:32px; background:#292524; border:0.5px solid #44403C;
                  border-radius:8px; display:flex; align-items:center; justify-content:center;">
        <i data-lucide="bot" style="width:16px; height:16px; color:#F97316;"></i>
      </div>
      <div style="background:#292524; border:0.5px solid #44403C; border-radius:12px;
                  border-top-left-radius:2px; padding:12px 16px; font-size:14px; color:#78716C;">
        En train de réfléchir...
      </div>`;
    chatBox.appendChild(div);
    chatBox.scrollTop = chatBox.scrollHeight;
    lucide.createIcons();
    return uid;
  }

  function removeTyping(id) {
    const el = document.getElementById(id);
    if (el) el.remove();
  }
</script>

{% endblock %}
